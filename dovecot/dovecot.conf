# Dovecot sandbox config — local IMAP for testing MailSubsystem
# NOT for production use. Plaintext auth allowed for local testing only.

protocols = imap

# --- Auth ---
disable_plaintext_auth = no
auth_mechanisms = plain login

passdb {
  driver = static
  args = password=testpass123
}

userdb {
  driver = static
  args = uid=vmail gid=vmail home=/var/mail/%u
}

# --- Mail storage ---
mail_location = maildir:/var/mail/%u/Maildir

# --- Namespace with standard folders ---
namespace inbox {
  inbox = yes
  separator = /

  mailbox Drafts {
    auto = subscribe
    special_use = \Drafts
  }
  mailbox Sent {
    auto = subscribe
    special_use = \Sent
  }
  mailbox "Sent Messages" {
    special_use = \Sent
  }
  mailbox Trash {
    auto = subscribe
    special_use = \Trash
  }
  mailbox Junk {
    auto = subscribe
    special_use = \Junk
  }
  mailbox Archive {
    auto = subscribe
    special_use = \Archive
  }
}

# --- SSL (trusted sandbox cert generated by scripts/setup-trusted-certs.sh) ---
ssl = yes
ssl_cert = </tmp/server.pem
ssl_key = </tmp/server.key

# --- Listeners ---
service imap-login {
  inet_listener imap {
    port = 143
  }
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}

# --- Logging ---
log_path = /dev/stderr
info_log_path = /dev/stderr
